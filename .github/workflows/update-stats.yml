name: Update GitHub Stats SVG

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate SVGs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: Niconve
        run: python generate_stats.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg activity.svg
          git diff --cached --quiet || git commit -m "chore: auto-update stats [skip ci]"
          git push
