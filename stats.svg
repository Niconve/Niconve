<svg width="860" height="200" viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="860" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0f0a0a"/>
    </linearGradient>
    <linearGradient id="barRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8290b"/>
      <stop offset="100%" stop-color="#c0200a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" fill="url(#bg)" rx="4"/>
  <rect width="860" height="200" fill="none" stroke="#1a1a1a" stroke-width="1" rx="4"/>

  <!-- Left divider -->
  <line x1="280" y1="20" x2="280" y2="180" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="580" y1="20" x2="580" y2="180" stroke="#1a1a1a" stroke-width="1"/>

  <!-- ═══ BLOCK 1: Contributions ═══ -->
  <text x="32" y="36" font-family="'Courier New',monospace" font-size="8" fill="#444" letter-spacing="2.5">TOTAL CONTRIBUTIONS</text>
  <text x="32" y="90" font-family="Georgia,serif" font-size="58" fill="#f4f3ef" font-weight="700" opacity=".95">11</text>
  <text x="32" y="114" font-family="'Courier New',monospace" font-size="8" fill="#555" letter-spacing="1">Jul 20, 2021 – today</text>

  <!-- mini bar chart -->
  <rect x="32" y="135" width="220" height="1" fill="#1a1a1a"/>
  <rect x="32" y="130" width="30" height="4" fill="#e8290b" opacity=".5" rx="1"/>
  <rect x="66" y="124" width="30" height="10" fill="#e8290b" opacity=".4" rx="1"/>
  <rect x="100" y="118" width="30" height="16" fill="#e8290b" opacity=".6" rx="1"/>
  <rect x="134" y="122" width="30" height="12" fill="#e8290b" opacity=".5" rx="1"/>
  <rect x="168" y="126" width="30" height="8" fill="#e8290b" opacity=".3" rx="1"/>
  <rect x="202" y="130" width="30" height="4" fill="#e8290b" opacity=".2" rx="1"/>

  <text x="32" y="156" font-family="'Courier New',monospace" font-size="7.5" fill="#333" letter-spacing="1">PUBLIC REPOS</text>
  <text x="140" y="156" font-family="Georgia,serif" font-size="13" fill="#f4f3ef" opacity=".6">1</text>

  <text x="32" y="174" font-family="'Courier New',monospace" font-size="7.5" fill="#333" letter-spacing="1">JOINED GITHUB</text>
  <text x="140" y="174" font-family="Georgia,serif" font-size="11" fill="#f4f3ef" opacity=".6">2021</text>

  <!-- ═══ BLOCK 2: Streak ═══ -->
  <text x="306" y="36" font-family="'Courier New',monospace" font-size="8" fill="#444" letter-spacing="2.5">CURRENT STREAK</text>

  <!-- Flame icon -->
  <text x="306" y="88" font-family="Georgia,serif" font-size="52" fill="#e8290b" opacity=".15">🔥</text>
  <text x="356" y="90" font-family="Georgia,serif" font-size="58" fill="#e8290b" font-weight="700">1</text>
  <text x="406" y="78" font-family="'Courier New',monospace" font-size="9" fill="#e8290b" opacity=".6">week</text>

  <text x="306" y="120" font-family="'Courier New',monospace" font-size="8" fill="#555">Week Streak · Top 1</text>

  <text x="306" y="148" font-family="'Courier New',monospace" font-size="7.5" fill="#333" letter-spacing="1">LONGEST STREAK</text>
  <text x="306" y="166" font-family="Georgia,serif" font-size="22" fill="#f4f3ef" opacity=".5">1 <tspan font-size="10" fill="#555">week</tspan></text>

  <text x="306" y="184" font-family="'Courier New',monospace" font-size="7.5" fill="#333" letter-spacing="1">Jul 13, 2026</text>

  <!-- ═══ BLOCK 3: Languages ═══ -->
  <text x="606" y="36" font-family="'Courier New',monospace" font-size="8" fill="#444" letter-spacing="2.5">TOP LANGUAGES</text>

  <!-- Lang bars -->
  <text x="606" y="68" font-family="'Courier New',monospace" font-size="9" fill="#888">Kotlin</text>
  <rect x="606" y="74" width="220" height="5" rx="2" fill="#1a1a1a"/>
  <rect x="606" y="74" width="160" height="5" rx="2" fill="url(#barRed)" opacity=".8"/>
  <text x="830" y="80" font-family="'Courier New',monospace" font-size="8" fill="#555" text-anchor="end">72%</text>

  <text x="606" y="100" font-family="'Courier New',monospace" font-size="9" fill="#888">Java</text>
  <rect x="606" y="106" width="220" height="5" rx="2" fill="#1a1a1a"/>
  <rect x="606" y="106" width="100" height="5" rx="2" fill="#f4f3ef" opacity=".2"/>
  <text x="830" y="112" font-family="'Courier New',monospace" font-size="8" fill="#555" text-anchor="end">45%</text>

  <text x="606" y="132" font-family="'Courier New',monospace" font-size="9" fill="#888">JavaScript</text>
  <rect x="606" y="138" width="220" height="5" rx="2" fill="#1a1a1a"/>
  <rect x="606" y="138" width="60" height="5" rx="2" fill="#f4f3ef" opacity=".12"/>
  <text x="830" y="144" font-family="'Courier New',monospace" font-size="8" fill="#555" text-anchor="end">27%</text>

  <text x="606" y="164" font-family="'Courier New',monospace" font-size="9" fill="#888">TypeScript</text>
  <rect x="606" y="170" width="220" height="5" rx="2" fill="#1a1a1a"/>
  <rect x="606" y="170" width="30" height="5" rx="2" fill="#f4f3ef" opacity=".08"/>
  <text x="830" y="176" font-family="'Courier New',monospace" font-size="8" fill="#555" text-anchor="end">13%</text>

  <!-- Bottom accent -->
  <rect x="0" y="196" width="860" height="4" rx="2" fill="#e8290b" opacity=".6"/>
</svg>
