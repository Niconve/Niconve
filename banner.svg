<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="1200" height="280"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bgGrad)"/>

  <!-- Red accent triangle top-right -->
  <polygon points="1200,0 900,0 1200,180" fill="#e8290b" opacity="0.85"/>

  <!-- Subtle grid lines -->
  <line x1="300" y1="0" x2="300" y2="280" stroke="#f4f3ef" stroke-width="0.4" opacity="0.07"/>
  <line x1="600" y1="0" x2="600" y2="280" stroke="#f4f3ef" stroke-width="0.4" opacity="0.07"/>
  <line x1="900" y1="0" x2="900" y2="280" stroke="#f4f3ef" stroke-width="0.4" opacity="0.07"/>
  <line x1="0" y1="93" x2="1200" y2="93" stroke="#f4f3ef" stroke-width="0.4" opacity="0.07"/>
  <line x1="0" y1="186" x2="1200" y2="186" stroke="#f4f3ef" stroke-width="0.4" opacity="0.07"/>

  <!-- Red dot accent -->
  <circle cx="64" cy="64" r="38" fill="#e8290b" opacity="0.15"/>
  <circle cx="64" cy="64" r="8" fill="#e8290b"/>

  <!-- Brand number BG -->
  <text x="820" y="310" font-family="Georgia, serif" font-style="italic" font-size="380" fill="#f4f3ef" opacity="0.025" letter-spacing="-20">01</text>

  <!-- Top label -->
  <text x="64" y="42" font-family="'Courier New', monospace" font-size="10" fill="#8a8a8a" letter-spacing="4">NICONVE™ · GITHUB PROFILE · 2026</text>

  <!-- Main name -->
  <text x="60" y="165" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="98" fill="#f4f3ef" letter-spacing="-4" opacity="0.95">Alden</text>
  <text x="62" y="240" font-family="Georgia, 'Times New Roman', serif" font-size="98" fill="#f4f3ef" letter-spacing="-4" font-weight="700">PRABASWARA</text>

  <!-- Red underline accent -->
  <rect x="62" y="248" width="580" height="3" fill="#e8290b"/>

  <!-- Right side info -->
  <text x="960" y="160" font-family="'Courier New', monospace" font-size="11" fill="#8a8a8a" letter-spacing="2" text-anchor="middle">CREATIVE DEVELOPER</text>
  <text x="960" y="182" font-family="'Courier New', monospace" font-size="11" fill="#8a8a8a" letter-spacing="2" text-anchor="middle">TEKNIK INFORMATIKA · UB</text>
  <text x="960" y="204" font-family="'Courier New', monospace" font-size="11" fill="#8a8a8a" letter-spacing="2" text-anchor="middle">MALANG · INDONESIA</text>

  <!-- Divider -->
  <line x1="840" y1="140" x2="840" y2="220" stroke="#f4f3ef" stroke-width="0.5" opacity="0.15"/>

  <!-- Bottom bar -->
  <rect x="0" y="265" width="1200" height="1" fill="#f4f3ef" opacity="0.08"/>
  <text x="64" y="275" font-family="'Courier New', monospace" font-size="9" fill="#8a8a8a" letter-spacing="3" opacity="0.6">WHERE DIFFERENT IS THE STANDARD</text>
  <text x="1136" y="275" font-family="'Courier New', monospace" font-size="9" fill="#e8290b" letter-spacing="2" text-anchor="end" opacity="0.8">✦</text>

  <!-- Grain overlay -->
  <rect width="1200" height="280" fill="#888" opacity="0.03" filter="url(#grain)"/>
</svg>
