<svg width="440" height="230" viewBox="0 0 440 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="440" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0f0a0a"/>
    </linearGradient>
    <style>
      .scan { animation: scan 3s linear infinite; }
      @keyframes scan { from{transform:translateY(-10px)} to{transform:translateY(250px)} }
      .blink { animation: blink 1.8s ease-in-out infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
      .float1 { animation: float1 4s ease-in-out infinite; }
      @keyframes float1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
      .float2 { animation: float2 5s ease-in-out infinite; }
      @keyframes float2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }
      .draw { stroke-dasharray: 600; stroke-dashoffset: 600; animation: draw 2s ease forwards; }
      @keyframes draw { to { stroke-dashoffset: 0; } }
      .fade { animation: fade .8s ease both; }
      .fade2 { animation: fade .8s ease .3s both; }
      .fade3 { animation: fade .8s ease .6s both; }
      .fade4 { animation: fade .8s ease .9s both; }
      @keyframes fade { from{opacity:0} to{opacity:1} }
      .pulse-ring { animation: pulseRing 2s ease-out infinite; transform-origin: 340px 50px; }
      @keyframes pulseRing { 0%{transform:scale(1);opacity:.6} 100%{transform:scale(2.2);opacity:0} }
      .type { animation: typing 4s steps(14) infinite; overflow:hidden; }
      @keyframes typing { 0%,100%{width:0} 40%,90%{width:140px} }
    </style>
    <clipPath id="c1"><rect width="440" height="230" rx="0"/></clipPath>
    <clipPath id="typeClip"><rect x="28" y="158" width="140" height="16"/></clipPath>
  </defs>

  <g clip-path="url(#c1)">
    <!-- BG -->
    <rect width="440" height="230" fill="url(#bg1)"/>

    <!-- Grid -->
    <line x1="0" y1="46" x2="440" y2="46" stroke="#f4f3ef" stroke-width=".4" opacity=".06"/>
    <line x1="0" y1="92" x2="440" y2="92" stroke="#f4f3ef" stroke-width=".4" opacity=".06"/>
    <line x1="0" y1="138" x2="440" y2="138" stroke="#f4f3ef" stroke-width=".4" opacity=".06"/>
    <line x1="0" y1="184" x2="440" y2="184" stroke="#f4f3ef" stroke-width=".4" opacity=".06"/>
    <line x1="88" y1="0" x2="88" y2="230" stroke="#f4f3ef" stroke-width=".4" opacity=".06"/>
    <line x1="176" y1="0" x2="176" y2="230" stroke="#f4f3ef" stroke-width=".4" opacity=".06"/>
    <line x1="264" y1="0" x2="264" y2="230" stroke="#f4f3ef" stroke-width=".4" opacity=".06"/>
    <line x1="352" y1="0" x2="352" y2="230" stroke="#f4f3ef" stroke-width=".4" opacity=".06"/>

    <!-- Scan line -->
    <rect class="scan" x="0" y="0" width="440" height="2" fill="#e8290b" opacity=".15"/>

    <!-- Android robot body - floating -->
    <g class="float1 fade2">
      <!-- head -->
      <rect x="178" y="52" width="84" height="58" rx="12" fill="none" stroke="#e8290b" stroke-width="1.5"/>
      <!-- eyes -->
      <circle cx="200" cy="76" r="5" fill="#e8290b"/>
      <circle cx="240" cy="76" r="5" fill="#e8290b"/>
      <!-- antenna -->
      <line x1="196" y1="52" x2="188" y2="36" stroke="#e8290b" stroke-width="1.5"/>
      <circle cx="188" cy="34" r="3" fill="#e8290b"/>
      <line x1="244" y1="52" x2="252" y2="36" stroke="#e8290b" stroke-width="1.5"/>
      <circle cx="252" cy="34" r="3" fill="#e8290b"/>
      <!-- body -->
      <rect x="166" y="114" width="108" height="68" rx="8" fill="none" stroke="#e8290b" stroke-width="1.5"/>
      <!-- arms -->
      <rect x="142" y="116" width="20" height="52" rx="10" fill="none" stroke="#e8290b" stroke-width="1.5"/>
      <rect x="278" y="116" width="20" height="52" rx="10" fill="none" stroke="#e8290b" stroke-width="1.5"/>
      <!-- legs -->
      <rect x="182" y="184" width="22" height="32" rx="11" fill="none" stroke="#e8290b" stroke-width="1.5"/>
      <rect x="236" y="184" width="22" height="32" rx="11" fill="none" stroke="#e8290b" stroke-width="1.5"/>
      <!-- chest detail -->
      <rect x="196" y="130" width="48" height="6" rx="3" fill="#e8290b" opacity=".3"/>
      <rect x="196" y="144" width="32" height="6" rx="3" fill="#e8290b" opacity=".2"/>
    </g>

    <!-- Pulse ring around robot -->
    <circle class="pulse-ring fade3" cx="220" cy="130" r="80" fill="none" stroke="#e8290b" stroke-width="1"/>
    <circle class="pulse-ring fade3" cx="220" cy="130" r="80" fill="none" stroke="#e8290b" stroke-width="1" style="animation-delay:.8s"/>

    <!-- Top label -->
    <text class="fade" x="20" y="22" font-family="'Courier New',monospace" font-size="8.5" fill="#555" letter-spacing="3">ANDROID DEV · NICONVE™</text>

    <!-- Blink dot -->
    <circle class="blink fade" cx="408" cy="16" r="4" fill="#e8290b"/>

    <!-- Code lines left -->
    <g class="fade3">
      <text x="20" y="80" font-family="'Courier New',monospace" font-size="8" fill="#333">class MainActivity</text>
      <text x="20" y="96" font-family="'Courier New',monospace" font-size="8" fill="#444">  : AppCompatActivity()</text>
      <text x="20" y="112" font-family="'Courier New',monospace" font-size="8" fill="#e8290b" opacity=".6">  override fun</text>
      <text x="20" y="128" font-family="'Courier New',monospace" font-size="8" fill="#333">  onCreate(...)</text>
    </g>

    <!-- Typing cursor bottom -->
    <g clip-path="url(#typeClip)">
      <text class="type fade4" x="28" y="170" font-family="'Courier New',monospace" font-size="9" fill="#e8290b" opacity=".5">$ kotlin build...</text>
    </g>
    <rect class="blink fade4" x="28" y="158" width="1" height="12" fill="#e8290b"/>

    <!-- Bottom bar -->
    <rect x="0" y="220" width="440" height="1" fill="#e8290b" opacity=".3"/>
    <text x="20" y="228" font-family="'Courier New',monospace" font-size="7" fill="#333" letter-spacing="2">ANDROID STUDIO · KOTLIN · JAVA</text>
  </g>
</svg>
