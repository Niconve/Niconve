<svg width="440" height="230" viewBox="0 0 440 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .rain0{animation:rain0 2.1s linear infinite;opacity:0}
      .rain1{animation:rain1 2.8s linear infinite .4s;opacity:0}
      .rain2{animation:rain2 2.4s linear infinite .8s;opacity:0}
      .rain3{animation:rain3 3.1s linear infinite 1.2s;opacity:0}
      .rain4{animation:rain4 2.6s linear infinite .2s;opacity:0}
      .rain5{animation:rain5 2.2s linear infinite .9s;opacity:0}
      @keyframes rain0{0%{transform:translateY(-40px);opacity:0}10%{opacity:.5}90%{opacity:.1}100%{transform:translateY(240px);opacity:0}}
      @keyframes rain1{0%{transform:translateY(-40px);opacity:0}10%{opacity:.3}90%{opacity:.05}100%{transform:translateY(240px);opacity:0}}
      @keyframes rain2{0%{transform:translateY(-40px);opacity:0}10%{opacity:.4}90%{opacity:.1}100%{transform:translateY(240px);opacity:0}}
      @keyframes rain3{0%{transform:translateY(-40px);opacity:0}10%{opacity:.2}90%{opacity:.05}100%{transform:translateY(240px);opacity:0}}
      @keyframes rain4{0%{transform:translateY(-40px);opacity:0}10%{opacity:.5}90%{opacity:.1}100%{transform:translateY(240px);opacity:0}}
      @keyframes rain5{0%{transform:translateY(-40px);opacity:0}10%{opacity:.3}90%{opacity:.05}100%{transform:translateY(240px);opacity:0}}
      .glow{animation:glow 3s ease-in-out infinite;filter:drop-shadow(0 0 6px #e8290b)}
      @keyframes glow{0%,100%{filter:drop-shadow(0 0 4px #e8290b)}50%{filter:drop-shadow(0 0 16px #e8290b)}}
      .f0{animation:fi .5s ease both}
      .f1{animation:fi .5s ease .2s both}
      .f2{animation:fi .5s ease .4s both}
      .f3{animation:fi .5s ease .6s both}
      .f4{animation:fi .5s ease .8s both}
      @keyframes fi{from{opacity:0}to{opacity:1}}
      .slide{animation:slide 1s cubic-bezier(.77,0,.18,1) .3s both}
      @keyframes slide{from{transform:translateX(-30px);opacity:0}to{transform:none;opacity:1}}
      .blink3{animation:blink3 1s step-end infinite}
      @keyframes blink3{0%,100%{opacity:1}50%{opacity:0}}
      .draw3{stroke-dasharray:300;stroke-dashoffset:300;animation:draw3 1.5s ease .8s forwards}
      @keyframes draw3{to{stroke-dashoffset:0}}
    </style>
    <clipPath id="c3"><rect width="440" height="230"/></clipPath>
    <linearGradient id="bg3" x1="0" y1="0" x2="440" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0a0f0a"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#c3)">
    <rect width="440" height="230" fill="url(#bg3)"/>

    <!-- Matrix rain columns -->
    <g class="rain0" font-family="'Courier New',monospace" font-size="10" fill="#e8290b">
      <text x="30">0</text><text x="30" y="14">1</text><text x="30" y="28">0</text>
      <text x="30" y="42">K</text><text x="30" y="56">o</text><text x="30" y="70">t</text>
      <text x="30" y="84">l</text><text x="30" y="98">i</text><text x="30" y="112">n</text>
    </g>
    <g class="rain1" font-family="'Courier New',monospace" font-size="10" fill="#e8290b" opacity=".3">
      <text x="70">1</text><text x="70" y="14">0</text><text x="70" y="28">1</text>
      <text x="70" y="42">1</text><text x="70" y="56">f</text><text x="70" y="70">u</text>
      <text x="70" y="84">n</text>
    </g>
    <g class="rain2" font-family="'Courier New',monospace" font-size="10" fill="#e8290b" opacity=".4">
      <text x="380">v</text><text x="380" y="14">a</text><text x="380" y="28">l</text>
      <text x="380" y="42">J</text><text x="380" y="56">a</text><text x="380" y="70">v</text>
      <text x="380" y="84">a</text>
    </g>
    <g class="rain3" font-family="'Courier New',monospace" font-size="10" fill="#f4f3ef" opacity=".15">
      <text x="410">0</text><text x="410" y="14">1</text><text x="410" y="28">1</text>
      <text x="410" y="42">0</text><text x="410" y="56">0</text>
    </g>
    <g class="rain4" font-family="'Courier New',monospace" font-size="10" fill="#e8290b" opacity=".25">
      <text x="340">f</text><text x="340" y="14">u</text><text x="340" y="28">n</text>
      <text x="340" y="42"> </text><text x="340" y="56">m</text><text x="340" y="70">a</text>
      <text x="340" y="84">i</text><text x="340" y="98">n</text>
    </g>
    <g class="rain5" font-family="'Courier New',monospace" font-size="10" fill="#f4f3ef" opacity=".1">
      <text x="110">1</text><text x="110" y="14">0</text><text x="110" y="28">1</text>
    </g>

    <!-- Big Kotlin diamond logo center -->
    <g class="glow f1">
      <polygon points="220,60 280,115 220,170 160,115" fill="none" stroke="#e8290b" stroke-width="1.5"/>
      <polygon points="220,60 250,115 220,140 190,115" fill="#e8290b" opacity=".15"/>
      <line x1="160" y1="115" x2="220" y2="60" stroke="#f4f3ef" stroke-width=".8" opacity=".3"/>
      <text x="220" y="120" font-family="Georgia,serif" font-size="22" fill="#f4f3ef" text-anchor="middle" opacity=".9" font-weight="700">K</text>
    </g>

    <!-- Corner code snippets -->
    <g class="f2">
      <text x="100" y="45" font-family="'Courier New',monospace" font-size="7.5" fill="#e8290b" opacity=".6">fun</text>
      <text x="122" y="45" font-family="'Courier New',monospace" font-size="7.5" fill="#666">onCreate()</text>
    </g>
    <g class="f3">
      <text x="100" y="60" font-family="'Courier New',monospace" font-size="7.5" fill="#555">val intent =</text>
    </g>
    <g class="f2">
      <text x="100" y="175" font-family="'Courier New',monospace" font-size="7.5" fill="#e8290b" opacity=".6">class</text>
      <text x="126" y="175" font-family="'Courier New',monospace" font-size="7.5" fill="#666">MainActivity</text>
    </g>
    <g class="f3">
      <text x="100" y="190" font-family="'Courier New',monospace" font-size="7.5" fill="#555">: AppCompatActivity()</text>
    </g>

    <!-- Connecting lines -->
    <line class="draw3" x1="155" y1="115" x2="90" y2="115" stroke="#e8290b" stroke-width=".8" opacity=".3"/>
    <line class="draw3" x1="285" y1="115" x2="350" y2="115" stroke="#e8290b" stroke-width=".8" opacity=".3"/>

    <!-- Right side -->
    <g class="f3">
      <text x="355" y="108" font-family="'Courier New',monospace" font-size="7.5" fill="#333">0x</text>
      <text x="355" y="120" font-family="'Courier New',monospace" font-size="7.5" fill="#e8290b" opacity=".5">e8</text>
      <text x="355" y="132" font-family="'Courier New',monospace" font-size="7.5" fill="#333">29</text>
      <text x="355" y="144" font-family="'Courier New',monospace" font-size="7.5" fill="#e8290b" opacity=".5">0b</text>
    </g>

    <!-- Blinking cursor -->
    <rect class="blink3 f4" x="200" y="200" width="5" height="10" fill="#e8290b" opacity=".6"/>

    <!-- Labels -->
    <text class="f0" x="20" y="14" font-family="'Courier New',monospace" font-size="8" fill="#333" letter-spacing="3">KOTLIN · JAVA · NICONVE™</text>
    <rect x="0" y="220" width="440" height="1" fill="#e8290b" opacity=".3"/>
    <text x="20" y="228" font-family="'Courier New',monospace" font-size="7" fill="#333" letter-spacing="2">ANDROID DEV · JVM · OBJECT ORIENTED</text>
  </g>
</svg>
